apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-bucket
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: ghcr.io/caiuacosta337/backup-bucket:latest
              imagePullPolicy: Always
              command: ["python", "backup.py", "--config", "/app/config.yml"]
              envFrom:
                - secretRef:
                    name: backup-aws
              volumeMounts:
                - name: config
                  mountPath: /app/config.yml
                  subPath: config.yml
                  readOnly: true
                - name: source
                  mountPath: /data/source
                  readOnly: true
                - name: state
                  mountPath: /app/state
          volumes:
            - name: config
              configMap:
                name: backup-config
            - name: source
              persistentVolumeClaim:
                claimName: backup-source-pvc
            - name: state
              persistentVolumeClaim:
                claimName: backup-state-pvc